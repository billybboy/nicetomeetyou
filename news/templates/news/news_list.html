<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NBA新聞列表</title>
  <style>
    :root {
      --page: #e7e7e7;
      --nav: #113a60;
      --nav-dark: #0a2944;
      --hero: #275487;
      --accent: #ff6c14;
      --panel: #ffffff;
      --ink: #101820;
      --muted: #64748b;
      --line: #d9dde2;
      --tag: #edf3fb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Helvetica Neue", "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      color: var(--ink);
      background: var(--page);
    }
    .topbar {
      background: var(--hero);
      color: #fff;
      box-shadow: inset 0 -1px 0 rgba(255, 255, 255, 0.08);
    }
    .topbar-inner,
    .nav-inner,
    .scoreboard,
    main {
      max-width: 1280px;
      margin: 0 auto;
    }
    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 20px 26px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 18px;
      font-size: clamp(2.2rem, 4vw, 4rem);
      font-weight: 400;
      letter-spacing: 0.02em;
    }
    .brand-mark {
      display: grid;
      place-items: center;
      width: 86px;
      height: 86px;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      font-size: 2.5rem;
      font-weight: 700;
    }
    .brand-text {
      line-height: 1;
    }
    .top-actions {
      display: flex;
      gap: 14px;
      font-size: 1.8rem;
    }
    .top-actions span {
      opacity: 0.96;
    }
    .nav-strip {
      background: var(--nav-dark);
      border-top: 1px solid rgba(255, 255, 255, 0.12);
      border-bottom: 1px solid rgba(0, 0, 0, 0.18);
    }
    .nav-inner {
      display: grid;
      grid-template-columns: repeat(8, minmax(0, 1fr));
    }
    .nav-item {
      position: relative;
      padding: 20px 10px;
      border-left: 1px solid rgba(96, 146, 198, 0.25);
      color: #fff;
      text-align: center;
      font-size: clamp(0.98rem, 2vw, 1.2rem);
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    .nav-item:last-child {
      border-right: 1px solid rgba(96, 146, 198, 0.25);
    }
    .nav-item.active::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 6px;
      background: var(--accent);
    }
    main {
      padding: 28px 20px 56px;
    }
    .hero {
      margin-bottom: 28px;
      padding: 0;
      color: #1a1a1a;
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 800;
      letter-spacing: 0.02em;
    }
    .subhead {
      margin: 0;
      max-width: 720px;
      color: #4b5563;
      font-size: 0.98rem;
      line-height: 1.6;
    }
    .status {
      margin: 0 0 6px;
      color: #6b7280;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
    }
    .card {
      display: block;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      border: 1px solid var(--line);
      background: var(--panel);
      transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
    }
    .card:hover {
      transform: translateY(-3px);
      border-color: #b9c9dc;
      box-shadow: 0 14px 30px rgba(16, 24, 32, 0.08);
    }
    .thumb {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      background: #d7dce2;
    }
    .body {
      padding: 18px 18px 20px;
    }
    .meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .title {
      margin: 0 0 10px;
      font-size: 1.42rem;
      line-height: 1.25;
      font-weight: 800;
    }
    .excerpt {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 0.98rem;
    }
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .tag {
      padding: 4px 10px;
      background: var(--tag);
      border-radius: 999px;
      font-size: 0.76rem;
      font-weight: 700;
      color: #23476d;
    }
    .empty {
      padding: 32px;
      border: 1px dashed var(--line);
      background: rgba(255, 255, 255, 0.78);
      color: var(--muted);
      text-align: center;
    }
    @media (max-width: 920px) {
      .nav-inner {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }
    @media (max-width: 640px) {
      .topbar-inner,
      main {
        padding-left: 14px;
        padding-right: 14px;
      }
      .brand {
        gap: 12px;
        font-size: 2.2rem;
      }
      .brand-mark {
        width: 60px;
        height: 60px;
        font-size: 1.8rem;
      }
      .nav-inner {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .hero {
        padding: 18px;
      }
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="brand-text">NBA 新聞列表</div>
      </div>
    </div>
  </header>
  <main>
    <section class="hero">
      <h1>NBA新聞列表</h1>
    </section>
    <section id="news-list" class="grid" aria-live="polite"></section>
  </main>
  <script>
    const statusNode = document.getElementById("status");
    const listNode = document.getElementById("news-list");

    function formatDate(value) {
      if (!value) return "未提供時間";
      return new Intl.DateTimeFormat("zh-TW", {
        dateStyle: "medium",
        timeStyle: "short",
      }).format(new Date(value));
    }

    function renderTags(tags) {
      if (!tags.length) return "";
      return `<div class="tags">${tags.map((tag) => `<span class="tag">${tag}</span>`).join("")}</div>`;
    }

    function renderCard(item) {
      const image = item.image_url
        ? `<img class="thumb" src="${item.image_url}" alt="${item.title}">`
        : `<div class="thumb"></div>`;
      return `
        <a class="card" href="/news/${item.id}/" data-news-id="${item.id}">
          ${image}
          <div class="body">
            <div class="meta">
              <span>${formatDate(item.published_at)}</span>
              <span>${item.author || "聯合新聞網"}</span>
            </div>
            <h2 class="title">${item.title}</h2>
            <p class="excerpt">${item.excerpt || item.caption || ""}</p>
            ${renderTags(item.tags || [])}
          </div>
        </a>
      `;
    }

    function upsertCard(item) {
      const existingCard = listNode.querySelector(`[data-news-id="${item.id}"]`);
      const markup = renderCard(item);

      if (existingCard) {
        existingCard.outerHTML = markup;
        return;
      }

      listNode.insertAdjacentHTML("afterbegin", markup);
    }

    function connectNewsSocket() {
      const protocol = window.location.protocol === "https:" ? "wss" : "ws";
      const socket = new WebSocket(`${protocol}://${window.location.host}/ws/news/`);

      socket.addEventListener("open", () => {
        statusNode.textContent = "Live Updates Connected";
      });

      socket.addEventListener("message", (event) => {
        const payload = JSON.parse(event.data);
        if (payload.type !== "news.created") {
          return;
        }
        upsertCard(payload.item);
        statusNode.textContent = "New Story Received";
      });

      socket.addEventListener("close", () => {
        statusNode.textContent = "Live Updates Reconnecting";
        window.setTimeout(connectNewsSocket, 3000);
      });
    }

    async function loadNews() {
      try {
        const response = await fetch("/api/news/");
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        const items = await response.json();
        if (!items.length) {
          listNode.innerHTML = '<div class="empty">目前沒有可顯示的新聞。</div>';
          return;
        }

        listNode.innerHTML = items.map(renderCard).join("");
      } catch (error) {
        statusNode.textContent = "載入失敗";
        listNode.innerHTML = `<div class="empty">無法取得新聞資料：${error.message}</div>`;
      }
    }

    loadNews();
    connectNewsSocket();
  </script>
</body>
</html>
