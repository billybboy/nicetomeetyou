<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>新聞詳情</title>
  <style>
    :root {
      --bg: #f2efe8;
      --panel: #fffdf8;
      --ink: #202225;
      --muted: #5d646c;
      --line: #ddd5c7;
      --accent: #0f5b65;
      --tag: #e4efee;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Helvetica Neue", "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(140deg, rgba(15, 91, 101, 0.08), transparent 35%),
        linear-gradient(180deg, #faf8f2, var(--bg));
    }
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 28px 16px 56px;
    }
    .back {
      display: inline-block;
      margin-bottom: 18px;
      color: var(--accent);
      text-decoration: none;
    }
    article {
      padding: 24px;
      border: 1px solid var(--line);
      background: var(--panel);
    }
    h1 {
      margin: 0 0 14px;
      font-size: clamp(2rem, 5vw, 3.4rem);
      line-height: 1.02;
      letter-spacing: -0.04em;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 18px;
      color: var(--muted);
      font-size: 0.95rem;
    }
    .hero {
      width: 100%;
      margin: 0 0 8px;
      aspect-ratio: 16 / 10;
      object-fit: cover;
      background: #d8ddd8;
    }
    .caption {
      max-width: 70%;
      margin: 0 auto 20px;
      color: var(--muted);
      font-size: 0.92rem;
      text-align: center;
    }
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0 0 20px;
    }
    .tag {
      padding: 4px 10px;
      background: var(--tag);
      border-radius: 999px;
      font-size: 0.82rem;
    }
    .content {
      line-height: 1.9;
      font-size: 1.06rem;
      white-space: pre-line;
    }
    .source {
      margin-top: 24px;
    }
    .status,
    .error {
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main>
    <a class="back" href="/">回到 NBA 新聞列表</a>
    <article id="news-detail" aria-live="polite">
      <p class="status">正在載入新聞詳情...</p>
    </article>
  </main>
  <script>
    const newsId = {{ news_id }};
    const detailNode = document.getElementById("news-detail");

    function formatDate(value) {
      if (!value) return "未提供時間";
      return new Intl.DateTimeFormat("zh-TW", {
        dateStyle: "medium",
        timeStyle: "short",
      }).format(new Date(value));
    }

    function renderTags(tags) {
      if (!tags.length) return "";
      return `<div class="tags">${tags.map((tag) => `<span class="tag">${tag}</span>`).join("")}</div>`;
    }

    function renderDetail(item) {
      const hero = item.image_url
        ? `<img class="hero" src="${item.image_url}" alt="${item.title}">`
        : "";
      const caption = item.caption ? `<p class="caption">${item.caption}</p>` : "";
      return `
        <h1>${item.title}</h1>
        <div class="meta">
          <span>${formatDate(item.published_at)}</span>
          <span>${item.author || "聯合新聞網"}</span>
        </div>
        ${hero}
        ${caption}
        ${renderTags(item.tags || [])}
        <div class="content">${item.content || ""}</div>
        <p class="source"><a href="${item.source_url}" target="_blank" rel="noreferrer">查看原始新聞</a></p>
      `;
    }

    async function loadDetail() {
      try {
        const response = await fetch(`/api/news/${newsId}/`);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        const item = await response.json();
        document.title = `${item.title} | 新聞詳情`;
        detailNode.innerHTML = renderDetail(item);
      } catch (error) {
        detailNode.innerHTML = `<p class="error">無法取得新聞詳情：${error.message}</p>`;
      }
    }

    loadDetail();
  </script>
</body>
</html>
